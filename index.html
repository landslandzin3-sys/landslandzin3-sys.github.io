<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>At The End Of Genesis</title>
<style>
:root {
  --clock-size: min(72vw, 470px);
}
* { box-sizing: border-box; }
html, body { width:100%; height:100%; margin:0; }
body {
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  z-index:-5;
  background:
    radial-gradient(circle at 50% 42%, rgba(255,255,255,.085), transparent 28%),
    radial-gradient(circle at 50% 54%, rgba(255,255,255,.035), transparent 52%),
    linear-gradient(180deg, #050505, #000 70%, #020202);
}
body::after {
  content:"";
  position:fixed;
  inset:0;
  z-index:4;
  pointer-events:none;
  opacity:.055;
  background-image:
    linear-gradient(transparent 0 48%, rgba(255,255,255,.14) 49% 50%, transparent 51%),
    linear-gradient(90deg, transparent 0 48%, rgba(255,255,255,.12) 49% 50%, transparent 51%);
  background-size:3px 3px, 4px 4px;
  mix-blend-mode:screen;
  animation:grain 8s steps(8) infinite;
}
canvas {
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}
#globalCracks { z-index:0; }
#glassShards { z-index:24; }
.intro {
  position:fixed;
  inset:0;
  z-index:50;
  display:grid;
  place-items:center;
  background:#000;
  transition:opacity 1.05s ease, transform 1.05s ease, filter 1.05s ease;
}
.intro.hidden {
  opacity:0;
  transform:scale(1.045);
  filter:blur(8px);
  pointer-events:none;
}
.intro-card {
  text-align:center;
  width:min(92vw, 780px);
  padding:34px;
}
.intro-kicker {
  color:rgba(255,255,255,.44);
  text-transform:uppercase;
  letter-spacing:.42em;
  font-size:11px;
  margin-bottom:18px;
}
.intro-title {
  margin:0 0 18px;
  font-family:Georgia, "Times New Roman", serif;
  font-size:clamp(34px, 6vw, 82px);
  letter-spacing:.09em;
  font-weight:700;
  line-height:.98;
  text-transform:uppercase;
  text-shadow:0 0 34px rgba(255,255,255,.09);
}
.intro-button {
  margin-top:14px;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(255,255,255,.045);
  color:rgba(255,255,255,.82);
  border-radius:999px;
  padding:13px 20px;
  letter-spacing:.22em;
  text-transform:uppercase;
  cursor:pointer;
  backdrop-filter:blur(10px);
  transition:transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease;
}
.intro-button:hover {
  transform:translateY(-2px);
  border-color:rgba(255,255,255,.55);
  background:rgba(255,255,255,.085);
  box-shadow:0 0 40px rgba(255,255,255,.075);
}
.scene {
  position:relative;
  z-index:3;
  width:100%;
  height:100%;
  display:grid;
  place-items:center;
  padding:26px;
}
.vignette {
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:radial-gradient(circle at center, transparent 34%, rgba(0,0,0,.74) 100%);
}
.core {
  width:min(94vw, 980px);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
  text-align:center;
  transition:opacity 1.2s ease, filter 1.2s ease;
}
.clock-wrap {
  position:relative;
  width:var(--clock-size);
  height:var(--clock-size);
  display:grid;
  place-items:center;
}
.clock-glow {
  position:absolute;
  inset:-16%;
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,255,255,.16), rgba(255,255,255,.04) 34%, transparent 70%);
  filter:blur(28px);
  animation:breathe 5.6s ease-in-out infinite;
}
.orbit {
  position:absolute;
  inset:-6%;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.08);
  animation:orbit 30s linear infinite;
}
.orbit::before, .orbit::after {
  content:"";
  position:absolute;
  left:50%;
  width:5px;
  height:5px;
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 18px rgba(255,255,255,.72);
}
.orbit::before { top:-3px; }
.orbit::after { bottom:-3px; opacity:.36; }
.clock {
  position:relative;
  width:100%;
  height:100%;
  border-radius:50%;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.20);
  background:
    radial-gradient(circle at 50% 34%, rgba(255,255,255,.095), rgba(255,255,255,.016) 32%, rgba(0,0,0,.76) 76%),
    linear-gradient(180deg, rgba(255,255,255,.032), rgba(255,255,255,.006));
  box-shadow:
    0 0 80px rgba(255,255,255,.035),
    inset 0 0 58px rgba(255,255,255,.045),
    inset 0 0 0 10px rgba(255,255,255,.022),
    inset 0 0 0 32px rgba(255,255,255,.014),
    inset 0 0 0 72px rgba(255,255,255,.006);
}
.clock::before, .clock::after {
  content:"";
  position:absolute;
  border-radius:50%;
  pointer-events:none;
}
.clock::before { inset:5.2%; border:1px solid rgba(255,255,255,.075); }
.clock::after { inset:13%; border:1px solid rgba(255,255,255,.045); }
#clockCracks {
  display:none !important;
}
.ticks, .numerals, .hands, .center-content { position:absolute; inset:0; }
.tick {
  position:absolute;
  left:50%;
  top:50%;
  width:2px;
  height:50%;
  transform-origin:50% 100%;
}
.tick::before {
  content:"";
  position:absolute;
  top:5.5%;
  left:50%;
  transform:translateX(-50%);
  width:1.5px;
  height:12px;
  border-radius:99px;
  background:rgba(255,255,255,.26);
}
.tick.major::before {
  width:3px;
  height:25px;
  background:rgba(255,255,255,.82);
  box-shadow:0 0 12px rgba(255,255,255,.18);
}
.numeral {
  position:absolute;
  left:50%;
  top:50%;
  width:46px;
  height:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  transform:translate(-50%, -50%);
  color:rgba(255,255,255,.72);
  font-family:Georgia, "Times New Roman", serif;
  font-size:clamp(13px, 1.2vw, 20px);
  line-height:1;
  letter-spacing:.12em;
  z-index:4;
  text-align:center;
}
.hand {
  position:absolute;
  left:50%;
  bottom:50%;
  transform-origin:50% 100%;
  transform:translateX(-50%) rotate(0deg);
  border-radius:999px;
  z-index:5;
  will-change:transform;
}
.hour {
  width:8px;
  height:27%;
  background:linear-gradient(180deg, #fff, rgba(255,255,255,.19));
  box-shadow:0 0 18px rgba(255,255,255,.13);
}
.minute {
  width:5px;
  height:39%;
  background:linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,.18));
  box-shadow:0 0 18px rgba(255,255,255,.13);
}
.second {
  width:2px;
  height:43%;
  background:linear-gradient(180deg, #fff, rgba(255,255,255,.25));
  box-shadow:0 0 22px rgba(255,255,255,.28);
}
.center-dot {
  position:absolute;
  left:50%;
  top:50%;
  z-index:8;
  width:18px;
  height:18px;
  transform:translate(-50%, -50%);
  border-radius:50%;
  background:#fff;
  box-shadow:0 0 20px rgba(255,255,255,.30), 0 0 0 7px rgba(255,255,255,.055);
}
.center-content {
  display:grid;
  place-items:center;
  pointer-events:none;
  z-index:4;
}
.target-label {
  margin-top:34%;
  color:rgba(255,255,255,.36);
  font-size:10px;
  letter-spacing:.24em;
  text-transform:uppercase;
}
.countdown-panel {
  width:min(92vw, 760px);
  display:grid;
  gap:14px;
}
.countdown-title {
  color:rgba(255,255,255,.46);
  font-size:11px;
  letter-spacing:.42em;
  text-transform:uppercase;
}
.countdown-grid {
  display:grid;
  grid-template-columns:repeat(4, 1fr);
  gap:10px;
}
.time-card {
  position:relative;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.12);
  border-radius:22px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,.022)), rgba(0,0,0,.38);
  padding:18px 12px 14px;
  box-shadow:inset 0 0 24px rgba(255,255,255,.02), 0 0 26px rgba(255,255,255,.02);
  backdrop-filter:blur(8px);
}
.time-card::before {
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(110deg, transparent 0 36%, rgba(255,255,255,.08) 48%, transparent 60% 100%);
  transform:translateX(-130%);
  animation:shine 5.5s ease-in-out infinite;
}
.time-number {
  position:relative;
  font-family:Georgia, "Times New Roman", serif;
  font-size:clamp(34px, 6vw, 70px);
  line-height:.9;
  letter-spacing:.04em;
}
.time-label {
  position:relative;
  margin-top:10px;
  color:rgba(255,255,255,.45);
  font-size:10px;
  letter-spacing:.28em;
  text-transform:uppercase;
}
.copy {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.coming {
  color:rgba(255,255,255,.72);
  text-transform:uppercase;
  letter-spacing:.34em;
  font-size:clamp(12px, .95vw + .4rem, 15px);
  font-weight:650;
}
.title {
  margin:0;
  font-family:Georgia, "Times New Roman", serif;
  text-transform:uppercase;
  letter-spacing:.12em;
  font-size:clamp(30px, 4.8vw, 68px);
  line-height:.98;
  font-weight:700;
  text-shadow:0 0 30px rgba(255,255,255,.08);
}
.sub {
  color:rgba(255,255,255,.46);
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:.34em;
}
.whiteout {
  position:fixed;
  inset:0;
  z-index:28;
  pointer-events:none;
  background:#fff;
  opacity:0;
  transition:opacity 1.4s ease;
}
.update-screen {
  position:fixed;
  inset:0;
  z-index:29;
  display:grid;
  place-items:center;
  pointer-events:none;
  opacity:0;
  transition:opacity 1.4s ease;
}
.update-text {
  color:#111;
  text-align:center;
  transform:translateY(18px);
  opacity:0;
  transition:transform 1.1s ease, opacity 1.1s ease;
}
.update-text h2 {
  margin:0;
  font-size:clamp(28px, 5vw, 64px);
  letter-spacing:.18em;
  text-transform:uppercase;
}
.update-text p {
  margin:14px 0 0;
  color:rgba(0,0,0,.58);
  font-size:clamp(12px, 1.2vw, 16px);
  letter-spacing:.22em;
  text-transform:lowercase;
}
body.exploding .core {
  animation:quake .06s linear infinite alternate;
  filter:brightness(1.55) contrast(1.25);
}
body.exploding .clock {
  animation:clockBoom .05s linear infinite alternate;
  box-shadow:0 0 120px rgba(255,255,255,.32), inset 0 0 72px rgba(255,255,255,.12);
}
body.exploding .clock-glow {
  opacity:1;
  filter:blur(38px) brightness(2.4);
}
body.phase-white .whiteout { opacity:1; }
body.phase-white .update-screen { opacity:1; }
body.phase-white .update-text { opacity:1; transform:translateY(0); }
body.phase-white .core,
body.phase-white #globalCracks,
body.phase-white .vignette {
  opacity:0;
  filter:blur(10px);
}
@keyframes grain {
  0% { transform:translate(0,0); }
  25% { transform:translate(-1%,1%); }
  50% { transform:translate(1%,-1%); }
  75% { transform:translate(1%,1%); }
  100% { transform:translate(0,0); }
}
@keyframes breathe {
  0%,100% { transform:scale(.96); opacity:.55; }
  50% { transform:scale(1.04); opacity:.88; }
}
@keyframes orbit { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
@keyframes shine {
  0%, 70% { transform:translateX(-130%); }
  100% { transform:translateX(130%); }
}
@keyframes quake {
  from { transform:translate(-8px, 5px) rotate(-.4deg) scale(1.01); }
  to { transform:translate(8px, -6px) rotate(.5deg) scale(1.025); }
}
@keyframes clockBoom {
  from { transform:translate(-7px, 4px) rotate(-1.3deg) scale(1.012); }
  to { transform:translate(7px, -5px) rotate(1.4deg) scale(1.05); }
}
@media (max-width:760px) {
  :root { --clock-size:min(84vw, 390px); }
  .countdown-grid { gap:8px; }
  .time-card { border-radius:17px; padding:14px 8px 12px; }
  .time-number { font-size:clamp(28px, 12vw, 52px); }
  .coming { letter-spacing:.22em; }
  .title { letter-spacing:.08em; }
  .sub { letter-spacing:.18em; }
}

.clock-wrap.minute-shake {
  animation: minuteShake var(--shake-dur, 1.2s) cubic-bezier(.18,.82,.18,1) both;
}

body.exploding .clock-wrap {
  animation: finalClockTremor .035s linear infinite alternate;
}

@keyframes minuteShake {
  0% { transform: translate(0,0) rotate(0deg); }
  12% { transform: translate(calc(var(--shake-power, 1) * 1px), calc(var(--shake-power, 1) * -0.6px)) rotate(calc(var(--shake-power, 1) * .06deg)); }
  24% { transform: translate(calc(var(--shake-power, 1) * -1px), calc(var(--shake-power, 1) * .7px)) rotate(calc(var(--shake-power, 1) * -.08deg)); }
  36% { transform: translate(calc(var(--shake-power, 1) * .8px), calc(var(--shake-power, 1) * .5px)) rotate(calc(var(--shake-power, 1) * .07deg)); }
  48% { transform: translate(calc(var(--shake-power, 1) * -0.7px), calc(var(--shake-power, 1) * -0.8px)) rotate(calc(var(--shake-power, 1) * -.05deg)); }
  60% { transform: translate(calc(var(--shake-power, 1) * .6px), calc(var(--shake-power, 1) * .4px)) rotate(calc(var(--shake-power, 1) * .05deg)); }
  78% { transform: translate(calc(var(--shake-power, 1) * -0.4px), calc(var(--shake-power, 1) * .3px)) rotate(calc(var(--shake-power, 1) * -.03deg)); }
  100% { transform: translate(0,0) rotate(0deg); }
}

@keyframes finalClockTremor {
  from { transform: translate(-16px, 10px) rotate(-2.2deg) scale(1.035); filter: brightness(1.65); }
  to { transform: translate(17px, -12px) rotate(2.4deg) scale(1.09); filter: brightness(2.15); }
}


/* ===== V10: No dial, only the hands and glass body ===== */
.ticks,
.numerals {
  display: none !important;
}

.clock::before,
.clock::after {
  display: none !important;
}

.clock {
  background:
    radial-gradient(circle at 50% 34%, rgba(255,255,255,.10), rgba(255,255,255,.018) 32%, rgba(0,0,0,.78) 76%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.035), transparent 48%),
    linear-gradient(180deg, rgba(255,255,255,.034), rgba(255,255,255,.006)) !important;
}

.midnight-strike-ring {
  position: absolute;
  inset: 19%;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.08);
  box-shadow: inset 0 0 34px rgba(255,255,255,.022), 0 0 26px rgba(255,255,255,.025);
  pointer-events: none;
}

body.exploding .midnight-strike-ring {
  animation: strikeRingPulse .18s linear infinite alternate;
}

@keyframes strikeRingPulse {
  from { transform: scale(.96); opacity:.35; }
  to { transform: scale(1.12); opacity:.95; box-shadow:0 0 80px rgba(255,255,255,.34); }
}

</style>
</head>
<body>
  <div class="intro" id="intro">
    <div class="intro-card">
      <div class="intro-kicker">the final countdown</div>
      <h1 class="intro-title">Finally everything is ready.</h1>
      <button class="intro-button" id="enterButton">Click to see the countdown.</button>
    </div>
  </div>

  <canvas id="globalCracks"></canvas>
  <canvas id="glassShards"></canvas>
  <div class="vignette"></div>

  <main class="scene">
    <section class="core" id="core">
      <div class="clock-wrap">
        <div class="clock-glow"></div>
        <div class="orbit"></div>
        <div class="clock" id="clock">
          <canvas id="clockCracks"></canvas>
          <div class="midnight-strike-ring"></div>
          <div class="ticks" id="ticks"></div>
          <div class="numerals" id="numerals"></div>
          <div class="hands">
            <div class="hand hour" id="hourHand"></div>
            <div class="hand minute" id="minuteHand"></div>
            <div class="hand second" id="secondHand"></div>
            <div class="center-dot"></div>
          </div>
          <div class="center-content"><div class="target-label">June 2 • 13:00</div></div>
        </div>
      </div>

      <div class="countdown-panel">
        <div class="countdown-title">countdown to genesis</div>
        <div class="countdown-grid">
          <div class="time-card"><div class="time-number" id="d">00</div><div class="time-label">days</div></div>
          <div class="time-card"><div class="time-number" id="h">00</div><div class="time-label">hours</div></div>
          <div class="time-card"><div class="time-number" id="m">00</div><div class="time-label">minutes</div></div>
          <div class="time-card"><div class="time-number" id="s">00</div><div class="time-label">seconds</div></div>
        </div>
      </div>

      <div class="copy">
        <div class="coming">Coming June 2th</div>
        <h1 class="title">At The End Of Genesis</h1>
        <div class="sub">do not leave before the end</div>
      </div>
    </section>
  </main>

  <div class="whiteout"></div>
  <div class="update-screen">
    <div class="update-text">
      <h2>Updating...</h2>
      <p>don't leave this page yet.</p>
    </div>
  </div>

    }
    // V9: fixed roman numeral placement.
    // This keeps XII, III, VI and IX visually centered instead of drifting downward.
    [
      ['XII', '50%', '13.5%'],
      ['III', '86.5%', '50%'],
      ['VI', '50%', '86.5%'],
      ['IX', '13.5%', '50%']
    ].forEach(([text, left, top]) => {
      const el = document.createElement('div');
      el.className = 'numeral';
      el.textContent = text;
      el.style.left = left;
      el.style.top = top;
      numsEl.appendChild(el);
    });
  }

  function resize() {
    const dpr = Math.max(1, window.devicePixelRatio || 1);
    [globalCanvas, shardsCanvas].forEach(canvas => {
      canvas.width = Math.floor(innerWidth * dpr);
      canvas.height = Math.floor(innerHeight * dpr);
      canvas.style.width = innerWidth + 'px';
      canvas.style.height = innerHeight + 'px';
    });
    globalCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    shardsCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // V8: cracks are only behind the clock, not inside/on top of it.
    clockCanvas.width = 0;
    clockCanvas.height = 0;

    lastCrackCount = -1;
    drawCracks(true);
  }

  function getGlobalCrackCount(now = Date.now()) {
    if(now < CRACK_EPOCH_UTC) return 0;
    return Math.min(MAX_CRACKS, Math.floor((now - CRACK_EPOCH_UTC) / CRACK_INTERVAL_MS));
  }

  function crackPath(seed, mode) {
    const w = mode === 'clock' ? clockCanvas.clientWidth : innerWidth;
    const h = mode === 'clock' ? clockCanvas.clientHeight : innerHeight;
    const cx = w / 2;
    const cy = h / 2;
    const points = [];
    let angle = seedRand(seed + 1) * Math.PI * 2;
    let x, y;

    if(mode === 'clock') {
      const radius = Math.min(w, h) * (0.08 + seedRand(seed + 2) * 0.18);
      x = cx + Math.cos(angle) * radius;
      y = cy + Math.sin(angle) * radius;
    } else {
      x = cx + (seedRand(seed + 3) - .5) * Math.min(w, h) * .28;
      y = cy + (seedRand(seed + 4) - .5) * Math.min(w, h) * .28;
    }

    points.push([x, y]);
    const steps = 3 + Math.floor(seedRand(seed + 5) * 7);
    const totalLen = Math.min(w, h) * (mode === 'clock' ? (0.08 + seedRand(seed + 6) * 0.34) : (0.10 + seedRand(seed + 6) * 0.52));

    for(let i=0;i<steps;i++) {
      const len = totalLen / steps * (0.72 + seedRand(seed * 11 + i + 7) * .86);
      angle += seedRand(seed * 13 + i + 8) * .92 - .46;
      x += Math.cos(angle) * len;
      y += Math.sin(angle) * len;
      points.push([x, y]);
    }
    return points;
  }

  function drawPath(ctx, points, alpha, width, glow) {
    if(points.length < 2) return;
    ctx.beginPath();
    ctx.moveTo(points[0][0], points[0][1]);
    for(let i=1;i<points.length;i++) ctx.lineTo(points[i][0], points[i][1]);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = width;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.shadowColor = `rgba(255,255,255,${glow})`;
    ctx.shadowBlur = glow * 34;
    ctx.stroke();
  }

  function drawCracks(force = false) {
    const count = getGlobalCrackCount();
    if(!force && count === lastCrackCount) return;
    lastCrackCount = count;

    globalCtx.clearRect(0,0,innerWidth,innerHeight);
    // V8: clock crack canvas intentionally unused.

    const bgCount = Math.min(count, 760);
    for(let i=0;i<bgCount;i++) {
      const seed = i + 1000;
      const ageBoost = Math.min(1, (count - i) / 80);
      const alpha = 0.035 + ageBoost * 0.10 + seedRand(seed + 20) * 0.035;
      const width = 0.75 + seedRand(seed + 21) * 1.15;
      drawPath(globalCtx, crackPath(seed, 'global'), alpha, width, 0.10 + alpha);
    }

    // V8: no cracks drawn on the clock face.
  }

  function updateClockHands(now) {
    // V10: the hands are no longer a normal real-time clock.
    // They slowly count down toward midnight, so at exactly 13:00 they all hit XII.
    const remainingMs = Math.max(0, TARGET - now);
    const totalSeconds = remainingMs / 1000;

    const secondsLeft = totalSeconds % 60;
    const minutesLeft = (totalSeconds / 60) % 60;
    const hoursLeft = (totalSeconds / 3600) % 12;

    // Countdown movement:
    // When remaining reaches 0, every hand becomes 0deg = XII.
    currentAngles.second = secondsLeft * 6;
    currentAngles.minute = minutesLeft * 6;
    currentAngles.hour = hoursLeft * 30;

    secondHand.style.transform = `translateX(-50%) rotate(${currentAngles.second}deg)`;
    minuteHand.style.transform = `translateX(-50%) rotate(${currentAngles.minute}deg)`;
    hourHand.style.transform = `translateX(-50%) rotate(${currentAngles.hour}deg)`;
  }

  function forceMidnightHands() {
    currentAngles.second = 0;
    currentAngles.minute = 0;
    currentAngles.hour = 0;

    secondHand.style.transform = 'translateX(-50%) rotate(0deg)';
    minuteHand.style.transform = 'translateX(-50%) rotate(0deg)';
    hourHand.style.transform = 'translateX(-50%) rotate(0deg)';
  }

  function updateCountdown(now) {
    const diff = TARGET - now;
    if(diff <= 0) {
      dEl.textContent = hEl.textContent = mEl.textContent = sEl.textContent = '00';
      explode();
      return;
    }
    const total = Math.floor(diff / 1000);
    dEl.textContent = pad(Math.floor(total / 86400));
    hEl.textContent = pad(Math.floor((total % 86400) / 3600));
    mEl.textContent = pad(Math.floor((total % 3600) / 60));
    sEl.textContent = pad(total % 60);
  }


  function shakePower(now = new Date()) {
    const totalWindow = 13 * 60 * 60 * 1000; // from June 2 00:00 to 13:00
    const start = new Date(TARGET.getFullYear(), TARGET.getMonth(), TARGET.getDate(), 0, 0, 0, 0);
    const progress = Math.max(0, Math.min(1, (now - start) / totalWindow));
    return 1.2 + progress * progress * 16;
  }

  function triggerMinuteShake(now = new Date(), force = false) {
    if(!started || exploded) return;

    const key = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}-${now.getHours()}-${now.getMinutes()}`;
    if(!force && key === lastMinuteShakeKey) return;
    lastMinuteShakeKey = key;

    const power = shakePower(now);
    const duration = 900 + Math.min(1700, power * 115);

    clockWrap.style.setProperty('--shake-power', power.toFixed(2));
    clockWrap.style.setProperty('--shake-dur', `${duration}ms`);
    clockWrap.classList.remove('minute-shake');
    void clockWrap.offsetWidth;
    clockWrap.classList.add('minute-shake');

    setTimeout(() => {
      if(!exploded) clockWrap.classList.remove('minute-shake');
    }, duration + 80);
  }

  function tick() {
    const now = new Date();
    if(!exploded) {
      updateClockHands(now);
      updateCountdown(now);
      drawCracks(false);
      triggerMinuteShake(now, false);
    }
    requestAnimationFrame(tick);
  }

  function spawnGlassExplosion() {
    shards = [];
    const cx = innerWidth / 2;
    const cy = innerHeight / 2;
    for(let i=0;i<720;i++) {
      const angle = Math.PI * 2 * seedRand(i + 9000);
      const speed = 4 + seedRand(i + 9100) * 26;
      const size = 4 + seedRand(i + 9200) * 26;
      shards.push({
        x: cx + (seedRand(i + 9300) - .5) * 80,
        y: cy + (seedRand(i + 9400) - .5) * 80,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        rot: seedRand(i + 9500) * Math.PI * 2,
        vr: (seedRand(i + 9600) - .5) * .36,
        size,
        life: 110 + seedRand(i + 9700) * 90,
        maxLife: 200
      });
    }
  }

  function animateShards() {
    shardsCtx.clearRect(0,0,innerWidth,innerHeight);
    if(shards.length) {
      shards.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= .988;
        p.vy = p.vy * .988 + .035;
        p.rot += p.vr;
        p.life -= 1;
      });
      shards = shards.filter(p => p.life > 0);
      shards.forEach(p => {
        const a = Math.max(0, p.life / p.maxLife);
        shardsCtx.save();
        shardsCtx.translate(p.x, p.y);
        shardsCtx.rotate(p.rot);
        shardsCtx.beginPath();
        shardsCtx.moveTo(0, -p.size * .65);
        shardsCtx.lineTo(p.size * .55, p.size * .25);
        shardsCtx.lineTo(-p.size * .45, p.size * .55);
        shardsCtx.closePath();
        shardsCtx.fillStyle = `rgba(255,255,255,${a * .72})`;
        shardsCtx.strokeStyle = `rgba(255,255,255,${a * .95})`;
        shardsCtx.lineWidth = 1;
        shardsCtx.shadowColor = `rgba(255,255,255,${a})`;
        shardsCtx.shadowBlur = 18;
        shardsCtx.fill();
        shardsCtx.stroke();
        shardsCtx.restore();
      });
    }
    requestAnimationFrame(animateShards);
  }

  function fadeAudioOut() {
    const startVol = audio.volume;
    const start = performance.now();
    const duration = 1300;
    function step(t) {
      const k = Math.min(1, (t - start) / duration);
      audio.volume = startVol * (1-k);
      if(k < 1) requestAnimationFrame(step);
      else {
        audio.pause();
        audio.currentTime = 0;
      }
    }
    requestAnimationFrame(step);
  }

  function explode() {
    if(exploded) return;
    exploded = true;
    document.body.classList.add('exploding');
    spawnGlassExplosion();
    fadeAudioOut();
    lastCrackCount = -1;
    drawCracks(true);

    // The clock has been moving toward midnight already.
    // At the exact objective moment, it strikes XII first, then explodes.
    hourHand.style.transition = 'transform .42s cubic-bezier(.12,.9,.08,1.03)';
    minuteHand.style.transition = 'transform .42s cubic-bezier(.12,.9,.08,1.03)';
    secondHand.style.transition = 'transform .42s cubic-bezier(.12,.9,.08,1.03)';
    forceMidnightHands();

    setTimeout(() => {
      hourHand.style.transition = 'transform 1.35s cubic-bezier(.12,.9,.08,1.03)';
      minuteHand.style.transition = 'transform 1.45s cubic-bezier(.12,.9,.08,1.03)';
      secondHand.style.transition = 'transform 1.55s cubic-bezier(.12,.9,.08,1.03)';
      hourHand.style.transform = 'translateX(-50%) rotate(720deg)';
      minuteHand.style.transform = 'translateX(-50%) rotate(1080deg)';
      secondHand.style.transform = 'translateX(-50%) rotate(1440deg)';
    }, 460);

    setTimeout(() => document.body.classList.add('phase-white'), 1850);
    setTimeout(() => location.reload(), 150000);
  }

  function startAudio() {
    audio.currentTime = 0;
    audio.volume = 0.48;
    const p = audio.play();
    if(p && typeof p.catch === 'function') p.catch(()=>console.warn('Audio blocked by browser.'));
  }

  function start() {
    if(started) return;
    started = true;
    intro.classList.add('hidden');
    startAudio();
    setTimeout(() => intro.style.display = 'none', 1200);
  }

  enterButton.addEventListener('click', start);

  buildClock();
  resize();
  tick();
  animateShards();

  window.addEventListener('resize', resize);

  if(new Date() >= TARGET) {
    intro.style.display = 'none';
    started = true;
    explode();
  }
})();
</script>
</body>
</html>
